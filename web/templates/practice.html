{% extends "base.html" %}

{% block title %}余音 - 练习{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">练习</h1>
    <p class="page-subtitle">选择简谱、跟吹演奏、实时反馈</p>
</div>

<div class="practice-layout">
    <!-- 左侧：简谱选择 + 指法速查 -->
    <div class="practice-left">
        <div class="card">
            <div class="card-header"><h2 class="card-title">选择简谱</h2></div>
            <div id="score-select" class="score-select-list"><p class="placeholder-text">加载中...</p></div>
            <div style="margin-top: 12px; display: flex; gap: 8px;">
                <input type="file" id="audio-file-input" accept="audio/*" style="display:none;">
                <button class="btn btn-sm btn-secondary" onclick="document.getElementById('audio-file-input').click()">从音频生成</button>
            </div>
        </div>
        <div class="card" id="score-preview-card" style="display: none;">
            <div class="card-header"><h2 class="card-title" id="preview-title">简谱</h2></div>
            <div id="score-preview" class="practice-preview"></div>
        </div>
        <!-- 指法速查 -->
        <div class="card">
            <div class="card-header"><h2 class="card-title">指法速查</h2></div>
            <div class="form-group">
                <select id="ff-type" class="select">
                    <option value="5">筒音作5</option>
                    <option value="1">筒音作1</option>
                    <option value="2">筒音作2</option>
                </select>
            </div>
            <div id="ff-buttons" class="note-buttons"></div>
            <div id="ff-display" class="fingering-display-small"></div>
        </div>
    </div>

    <!-- 中间：练习反馈 + 得分 -->
    <div class="practice-center">
        <div class="card">
            <div class="card-header"><h2 class="card-title">音高反馈</h2></div>
            <div class="pitch-feedback">
                <div id="pitch-note" class="pitch-note">--</div>
                <div id="pitch-expected" class="pitch-expected"></div>
                <div id="pitch-status" class="pitch-status"></div>
                <div class="pitch-meter"><div id="pitch-meter-fill" class="pitch-meter-fill"></div></div>
            </div>
            <div class="practice-controls">
                <button id="btn-start" class="btn btn-primary">开始练习</button>
                <button id="btn-stop" class="btn btn-secondary" disabled>停止</button>
            </div>
        </div>

        <!-- 节拍器 -->
        <div class="card">
            <div class="card-header"><h2 class="card-title">节拍器</h2></div>
            <div class="metronome-area">
                <div class="bpm-row">
                    <button class="btn btn-sm" onclick="adjBpm(-10)">-10</button>
                    <button class="btn btn-sm" onclick="adjBpm(-1)">-1</button>
                    <div class="bpm-value-large" id="bpm-display">80</div>
                    <button class="btn btn-sm" onclick="adjBpm(1)">+1</button>
                    <button class="btn btn-sm" onclick="adjBpm(10)">+10</button>
                </div>
                <input type="range" id="bpm-slider" class="progress-slider" min="40" max="200" value="80">
                <div id="beat-dots" class="beat-dots">
                    <div class="dot-metro"></div><div class="dot-metro"></div><div class="dot-metro"></div><div class="dot-metro"></div>
                </div>
                <div style="display: flex; gap: 8px; justify-content: center; margin-top: 8px;">
                    <button id="btn-metro-play" class="btn btn-sm btn-primary">节拍器</button>
                    <button id="btn-tap" class="btn btn-sm">TAP</button>
                    <span id="tap-result" class="tap-result"></span>
                </div>
            </div>
        </div>

        <!-- 得分 -->
        <div class="card" id="score-card" style="display: none;">
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-value" id="correct-count">0</div><div class="stat-label">正确</div></div>
                <div class="stat-item"><div class="stat-value" id="wrong-count">0</div><div class="stat-label">错误</div></div>
                <div class="stat-item"><div class="stat-value" id="accuracy-rate">0%</div><div class="stat-label">准确率</div></div>
            </div>
        </div>
    </div>

    <!-- 右侧：指法显示 -->
    <div class="practice-right">
        <div class="card">
            <div class="card-header"><h2 class="card-title">当前指法</h2></div>
            <div class="fingering-holes-large">
                <div class="hole-large">-</div><div class="hole-large">-</div><div class="hole-large">-</div>
                <div class="hole-large">-</div><div class="hole-large">-</div><div class="hole-large">-</div>
            </div>
            <p class="placeholder-text" id="fingering-note-name">选择简谱后显示</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    const FIVE_MAP = {
        '(5)':'bbbbbb','(6)':'bbbbbw','(7)':'bbbbww','1':'bbbwww','2':'bbwwww',
        '3':'bwwwww','4':'wbbwww','5':'wbbbbb','6':'bbbbbw','7':'bbbbww',
        '[1]':'bbbwww','[2]':'bbwwww','[3]':'bwwwww','[4]':'hwwwww','[5]':'wbbbbb'
    };
    const ONE_MAP = {
        '1':'bbbbbb','2':'bbbbbw','3':'bbbbww','4':'bbbwww',
        '5':'bbwwww','6':'bwwwww','7':'wwwwww',
        '[1]':'wbbbbb','[2]':'bbbbbw','[3]':'bbbbww','[4]':'bbbwww','[5]':'bbwwww'
    };

    let selectedScore = null, scoreNotes = [], isRunning = false;
    let audioCtx, micStream, analyser, currentNoteIdx = 0;
    let correctCount = 0, wrongCount = 0;

    // ============ 加载简谱列表 ============
    async function loadScores() {
        const resp = await fetch('/api/scores');
        const data = await resp.json();
        const list = document.getElementById('score-select');
        if (data.scores?.length) {
            list.innerHTML = data.scores.map(s => `<div class="score-item" onclick="selectScore('${s.id}')"><span>${s.title}</span><span style="color:var(--text-secondary);">${s.key}调</span></div>`).join('');
        } else { list.innerHTML = '<p class="placeholder-text">暂无简谱</p>'; }
    }

    window.selectScore = async (id) => {
        document.querySelectorAll('.score-item').forEach(e => e.classList.remove('selected'));
        event.target.closest('.score-item').classList.add('selected');
        const r = await fetch(`/api/score/${id}`); const d = await r.json();
        selectedScore = d; scoreNotes = JSON.parse(d.notes_data || '[]');
        document.getElementById('score-preview-card').style.display = 'block';
        document.getElementById('preview-title').textContent = d.title;
        document.getElementById('score-preview').innerHTML = scoreNotes.map(item => {
            if (item.note === 'BAR') return '<span class="bar-line-mini">|</span>';
            return `<span class="note-mini">${item.note.replace(/[()\[\]]/g,'')}</span>`;
        }).join('');
        document.getElementById('bpm-slider').value = d.tempo || 80;
        document.getElementById('bpm-display').textContent = d.tempo || 80;
    };

    // ============ 指法速查 ============
    async function loadFingeringNotes() {
        const type = document.getElementById('ff-type').value;
        const r = await fetch(`/api/notes?type=${type}`); const d = await r.json();
        const btns = document.getElementById('ff-buttons');
        btns.innerHTML = d.notes.map(n => `<button class="note-btn" onclick="showFingering('${n}')">${n}</button>`).join('');
    }

    window.showFingering = (note) => {
        const type = document.getElementById('ff-type').value;
        const map = type === '5' ? FIVE_MAP : ONE_MAP;
        const f = map[note];
        document.getElementById('ff-display').innerHTML = f ? f.split('').map(c => c==='b'?'●':(c==='h'?'◐':'○')).join(' ') : '--';
    };

    document.getElementById('ff-type').addEventListener('change', loadFingeringNotes);

    // ============ 节拍器 ============
    let metroPlaying = false, metroInterval;
    const bpmSlider = document.getElementById('bpm-slider');
    bpmSlider.addEventListener('input', e => document.getElementById('bpm-display').textContent = e.target.value);

    window.adjBpm = (delta) => {
        let v = parseInt(bpmSlider.value) + delta;
        v = Math.max(40, Math.min(200, v));
        bpmSlider.value = v;
        document.getElementById('bpm-display').textContent = v;
    };

    document.getElementById('btn-metro-play').addEventListener('click', () => {
        if (metroPlaying) {
            clearInterval(metroInterval); metroPlaying = false;
            document.getElementById('btn-metro-play').textContent = '节拍器';
            document.querySelectorAll('.dot-metro').forEach(d => d.classList.remove('active'));
        } else {
            const bpm = parseInt(bpmSlider.value);
            const interval = 60000 / bpm;
            let beat = 0;
            metroPlaying = true;
            document.getElementById('btn-metro-play').textContent = '停止';
            metroInterval = setInterval(() => {
                document.querySelectorAll('.dot-metro').forEach(d => d.classList.remove('active'));
                document.querySelectorAll('.dot-metro')[beat % 4]?.classList.add('active');
                beat++;
            }, interval);
        }
    });

    // Tap测速
    let tapTimes = [];
    document.getElementById('btn-tap').addEventListener('click', () => {
        tapTimes.push(Date.now());
        if (tapTimes.length > 8) tapTimes.shift();
        if (tapTimes.length >= 2) {
            const intervals = [];
            for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
            const avg = intervals.reduce((a,b) => a+b) / intervals.length;
            const bpm = Math.round(60000 / avg);
            document.getElementById('tap-result').textContent = bpm + ' BPM';
            bpmSlider.value = bpm;
            document.getElementById('bpm-display').textContent = bpm;
        }
    });

    // ============ 练习模式 ============
    document.getElementById('btn-start').addEventListener('click', async () => {
        if (!selectedScore) { alert('请先选择简谱'); return; }
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(micStream);
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048;
            source.connect(analyser);
            isRunning = true; correctCount = 0; wrongCount = 0; currentNoteIdx = 0;
            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-stop').disabled = false;
            document.getElementById('score-card').style.display = 'block';
            runPractice();
        } catch (e) { alert('无法访问麦克风: ' + e.message); }
    });

    document.getElementById('btn-stop').addEventListener('click', () => {
        isRunning = false;
        if (micStream) micStream.getTracks().forEach(t => t.stop());
        if (audioCtx) audioCtx.close();
        document.getElementById('btn-start').disabled = false;
        document.getElementById('btn-stop').disabled = true;
    });

    function runPractice() {
        if (!isRunning) return;
        const buf = new Uint8Array(analyser.fftSize);
        analyser.getByteTimeDomainData(buf);
        const freq = detectFreq(buf);
        const note = freqToStr(freq);

        if (note && freq > 50 && freq < 2000) {
            document.getElementById('pitch-note').textContent = note;
            document.getElementById('pitch-meter-fill').style.width = '60%';
            if (currentNoteIdx < scoreNotes.length) {
                const expected = scoreNotes[currentNoteIdx];
                document.getElementById('pitch-expected').textContent = '目标: ' + expected.note;
                document.getElementById('fingering-note-name').textContent = expected.note;
                updateFingering(expected.note);
                if (expected.note === note) {
                    correctCount++; currentNoteIdx++;
                    document.getElementById('pitch-status').textContent = '✓';
                    document.getElementById('pitch-status').style.color = '#2e7d32';
                }
            }
        } else {
            document.getElementById('pitch-meter-fill').style.width = '0%';
        }

        document.getElementById('correct-count').textContent = correctCount;
        const total = correctCount + wrongCount || 1;
        document.getElementById('accuracy-rate').textContent = Math.round(correctCount / total * 100) + '%';
        requestAnimationFrame(runPractice);
    }

    function detectFreq(buf) {
        let sum = 0; for (let v of buf) sum += v;
        const mean = sum / buf.length;
        let maxC = 0, maxL = 0;
        for (let lag = 40; lag < buf.length / 2; lag++) {
            let corr = 0;
            for (let i = 0; i < buf.length - lag; i++) corr += (buf[i] - mean) * (buf[i + lag] - mean);
            if (corr > maxC) { maxC = corr; maxL = lag; }
        }
        return maxL > 0 ? audioCtx.sampleRate / maxL : 0;
    }

    function freqToStr(freq) {
        if (freq < 50 || freq > 2000) return null;
        const notes = ['1','#1','2','#2','3','4','#4','5','#5','6','#6','7'];
        const semitone = Math.round(12 * Math.log2(freq / 440)) + 69;
        return notes[semitone % 12].replace('#', '');
    }

    function updateFingering(note) {
        const type = document.getElementById('ff-type').value;
        const map = type === '5' ? FIVE_MAP : ONE_MAP;
        const f = map[note];
        if (!f) return;
        const holes = document.querySelectorAll('.practice-right .hole-large');
        for (let i = 0; i < 6 && i < f.length; i++) {
            holes[i].classList.toggle('pressed', f[i] === 'b');
            holes[i].textContent = f[i] === 'b' ? '●' : (f[i] === 'h' ? '◐' : '○');
        }
    }

    // ============ 从音频生成简谱 ============
    document.getElementById('audio-file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        try {
            const r = await fetch('/api/audio/analyze', { method: 'POST', body: formData });
            const d = await r.json();
            if (d.success && d.score_text) {
                // 保存为简谱
                const saveR = await fetch('/api/score', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ title: file.name.replace(/\.[^.]+$/, ''), notes_data: d.score_text })
                });
                const saveD = await saveR.json();
                if (saveD.success) {
                    location.reload();
                }
            } else {
                alert('分析失败: ' + (d.error || '无法识别'));
            }
        } catch (er) { alert('分析出错: ' + er.message); }
    });

    // 初始化
    loadScores();
    loadFingeringNotes();
});
</script>
{% endblock %}
