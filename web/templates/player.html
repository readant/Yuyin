{% extends "base.html" %}

{% block title %}余音 - 欣赏{% endblock %}

{% block content %}
<!-- 沉浸式播放器 -->
<div class="immersive-player" id="immersive-player">
    <!-- 动态背景 -->
    <div class="player-bg" id="player-bg"></div>

    <!-- 主内容区 -->
    <div class="player-main">
        <!-- 曲目信息 -->
        <div class="player-info-float">
            <h1 id="track-title" class="immersive-title">未选择曲目</h1>
            <p id="track-artist" class="immersive-artist">请从曲库选择一首歌曲</p>
        </div>

        <!-- 唱片 -->
        <div class="vinyl-container">
            <div class="vinyl-disc" id="vinyl-disc">
                <div class="vinyl-grooves"></div>
                <div class="vinyl-inner">
                    <span class="vinyl-note">~</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部控制区（悬停显示） -->
    <div class="player-controls-area" id="controls-area">
        <!-- 进度条 -->
        <div class="progress-container">
            <span id="current-time" class="progress-time">0:00</span>
            <div class="progress-bar" id="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
                <div class="progress-thumb" id="progress-thumb"></div>
            </div>
            <span id="total-time" class="progress-time">0:00</span>
        </div>

        <!-- 控制按钮 -->
        <div class="controls-row">
            <div class="controls-left">
                <button id="btn-speed" class="ctrl-btn speed-btn" title="播放速度">1x</button>
                <button id="btn-ab" class="ctrl-btn ab-btn" title="A-B循环">A-B</button>
            </div>

            <div class="controls-center">
                <button id="btn-prev" class="ctrl-btn" title="上一首">|&lt;</button>
                <button id="btn-play" class="play-btn-main" title="播放/暂停">&gt;</button>
                <button id="btn-next" class="ctrl-btn" title="下一首">&gt;|</button>
            </div>

            <div class="controls-right">
                <button id="btn-lyrics" class="ctrl-btn" title="加载歌词">歌词</button>
                <button id="btn-mode" class="ctrl-btn" title="播放模式">顺序</button>
                <button id="btn-list" class="ctrl-btn" title="播放列表">列表</button>
                <button id="btn-volume" class="ctrl-btn" title="音量">音量</button>
            </div>
        </div>

        <!-- 音量滑块（点击音量按钮显示） -->
        <div class="volume-popup" id="volume-popup" style="display: none;">
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="80" orient="vertical">
        </div>

        <!-- 歌词加载弹窗 -->
        <div class="lyrics-popup" id="lyrics-popup" style="display: none;">
            <div class="popup-header">
                <span>加载歌词</span>
                <button id="btn-close-lyrics-popup" class="panel-close">×</button>
            </div>
            <textarea id="lyrics-textarea" class="popup-textarea" placeholder="粘贴LRC歌词...&#10;&#10;[00:05.000]第一句&#10;[00:10.000]第二句" rows="6"></textarea>
            <div class="popup-btns">
                <input type="file" id="lrc-file-input" accept=".lrc,.txt" style="display:none;">
                <button class="btn btn-sm" onclick="document.getElementById('lrc-file-input').click()">选择文件</button>
                <button id="btn-load-lyrics-text" class="btn btn-sm btn-primary">加载</button>
            </div>
        </div>
    </div>

    <!-- 歌词显示 -->
    <div class="lyrics-display" id="lyrics-display" style="display: none;">
        <div class="lyrics-scroll" id="lyrics-scroll"></div>
    </div>


</div>

<!-- 播放列表面板 -->
<div class="side-panel" id="playlist-panel">
    <div class="panel-header">
        <h3>播放列表</h3>
        <button id="btn-close-list" class="panel-close">×</button>
    </div>
    <div class="panel-content" id="playlist-content">
        <p class="empty-hint">暂无曲目</p>
    </div>
</div>

<!-- 遮罩层 -->
<div class="panel-overlay" id="panel-overlay" style="display: none;"></div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    // ==================== 元素引用 ====================
    const audio = document.getElementById('audio-player');
    const titleEl = document.getElementById('track-title');
    const artistEl = document.getElementById('track-artist');
    const playBtn = document.getElementById('btn-play');
    const prevBtn = document.getElementById('btn-prev');
    const nextBtn = document.getElementById('btn-next');
    const speedBtn = document.getElementById('btn-speed');
    const abBtn = document.getElementById('btn-ab');
    const modeBtn = document.getElementById('btn-mode');
    const listBtn = document.getElementById('btn-list');
    const volumeBtn = document.getElementById('btn-volume');
    const lyricsBtn = document.getElementById('btn-lyrics');
    const lyricsPopup = document.getElementById('lyrics-popup');
    const lyricsTextarea = document.getElementById('lyrics-textarea');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const progressThumb = document.getElementById('progress-thumb');
    const currentTimeEl = document.getElementById('current-time');
    const totalTimeEl = document.getElementById('total-time');
    const vinylDisc = document.getElementById('vinyl-disc');
    const controlsArea = document.getElementById('controls-area');
    const playlistPanel = document.getElementById('playlist-panel');
    const playlistContent = document.getElementById('playlist-content');
    const panelOverlay = document.getElementById('panel-overlay');
    const volumePopup = document.getElementById('volume-popup');
    const volumeSlider = document.getElementById('volume-slider');
    const playerBg = document.getElementById('player-bg');
    const lyricsDisplay = document.getElementById('lyrics-display');
    const lyricsScroll = document.getElementById('lyrics-scroll');

    // ==================== 状态 ====================
    let currentTrack = null;
    let trackList = [];
    let currentIndex = -1;
    let playMode = 'sequence'; // sequence / shuffle / single
    let speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
    let speedIndex = 2; // 默认 1x
    let abA = null; // A-B循环起点
    let abB = null; // A-B循环终点
    let isAbMode = false;
    let playStartTime = 0; // 开始播放时间
    let lyricsData = []; // 歌词数据
    let currentLyricIndex = -1; // 当前歌词行



    // ==================== 加载曲目列表 ====================
    async function loadTracks() {
        try {
            const resp = await fetch('/api/tracks');
            const data = await resp.json();
            trackList = data.tracks || [];
            renderPlaylist();

            // 从URL获取track参数
            const params = new URLSearchParams(window.location.search);
            const trackId = params.get('track');
            if (trackId) {
                currentIndex = trackList.findIndex(t => t.id == trackId);
                if (currentIndex >= 0) loadTrack(trackList[currentIndex]);
            }
        } catch (e) {
            console.error('加载曲目失败:', e);
        }
    }

    // ==================== 渲染播放列表 ====================
    function renderPlaylist() {
        if (trackList.length === 0) {
            playlistContent.innerHTML = '<p class="empty-hint">暂无曲目，请先扫描曲库</p>';
            return;
        }
        playlistContent.innerHTML = trackList.map((t, i) => `
            <div class="playlist-item ${i === currentIndex ? 'active' : ''}" onclick="playFromList(${i})">
                <span class="playlist-index">${i + 1}</span>
                <div class="playlist-info">
                    <span class="playlist-title">${t.title}</span>
                    <span class="playlist-artist">${t.artist || '未知'}</span>
                </div>
            </div>
        `).join('');
    }

    window.playFromList = function(index) {
        currentIndex = index;
        loadTrack(trackList[index]);
        renderPlaylist();
    };

    // ==================== 加载并播放曲目 ====================
    function loadTrack(track) {
        currentTrack = track;
        titleEl.textContent = track.title;
        artistEl.textContent = track.artist || '未知艺术家';

        audio.src = '/api/serve-audio/' + track.id;
        audio.load();
        audio.play();
        playBtn.textContent = '||';
        vinylDisc.classList.add('playing');
        playStartTime = Date.now();
        refreshLyrics();

        // 动态背景色
        updateBackground();
    }

    // ==================== 播放控制 ====================
    playBtn.addEventListener('click', () => {
        if (!audio.src) return;
        if (audio.paused) {
            audio.play();
            playBtn.textContent = '||';
            vinylDisc.classList.add('playing');
        } else {
            audio.pause();
            playBtn.textContent = '>';
            vinylDisc.classList.remove('playing');
        }
    });

    prevBtn.addEventListener('click', () => {
        if (trackList.length === 0) return;
        if (playMode === 'shuffle') {
            currentIndex = Math.floor(Math.random() * trackList.length);
        } else {
            currentIndex = (currentIndex - 1 + trackList.length) % trackList.length;
        }
        loadTrack(trackList[currentIndex]);
        renderPlaylist();
    });

    nextBtn.addEventListener('click', () => {
        if (trackList.length === 0) return;
        nextTrack();
    });

    function nextTrack() {
        if (playMode === 'shuffle') {
            currentIndex = Math.floor(Math.random() * trackList.length);
        } else if (playMode === 'single') {
            // 单曲循环，重新播放当前曲目
            audio.currentTime = 0;
            audio.play();
            return;
        } else {
            currentIndex = (currentIndex + 1) % trackList.length;
        }
        loadTrack(trackList[currentIndex]);
        renderPlaylist();
    }

    // ==================== 进度条 ====================
    let isDragging = false;

    progressBar.addEventListener('mousedown', (e) => {
        isDragging = true;
        updateProgress(e);
    });

    document.addEventListener('mousemove', (e) => {
        if (isDragging) updateProgress(e);
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
    });

    function updateProgress(e) {
        if (!audio.duration) return;
        const rect = progressBar.getBoundingClientRect();
        let pct = (e.clientX - rect.left) / rect.width;
        pct = Math.max(0, Math.min(1, pct));
        audio.currentTime = pct * audio.duration;
    }

    audio.addEventListener('timeupdate', () => {
        if (!audio.duration || isDragging) return;
        const pct = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = pct + '%';
        progressThumb.style.left = pct + '%';
        currentTimeEl.textContent = formatTime(audio.currentTime);

        // A-B循环
        if (isAbMode && abA !== null && abB !== null) {
            if (audio.currentTime >= abB) {
                audio.currentTime = abA;
            }
        }

        // 同步歌词
        syncLyrics();
    });

    audio.addEventListener('loadedmetadata', () => {
        totalTimeEl.textContent = formatTime(audio.duration);
    });

    // ==================== 播放结束 ====================
    audio.addEventListener('ended', () => {
        // 记录听歌
        recordListen();
        // 记录练习
        recordPractice();
        nextTrack();
    });

    // ==================== 倍速控制 ====================
    speedBtn.addEventListener('click', () => {
        speedIndex = (speedIndex + 1) % speeds.length;
        const speed = speeds[speedIndex];
        audio.playbackRate = speed;
        speedBtn.textContent = speed + 'x';
    });

    // ==================== A-B循环 ====================
    abBtn.addEventListener('click', () => {
        if (abA === null) {
            abA = audio.currentTime;
            abBtn.textContent = 'A-';
            abBtn.classList.add('active');
        } else if (abB === null) {
            abB = audio.currentTime;
            abBtn.textContent = 'A-B';
            isAbMode = true;
        } else {
            abA = null;
            abB = null;
            isAbMode = false;
            abBtn.textContent = 'A-B';
            abBtn.classList.remove('active');
        }
    });

    // ==================== 播放模式 ====================
    const modes = ['sequence', 'shuffle', 'single'];
    const modeNames = ['顺序', '随机', '单曲'];
    let modeIndex = 0;

    modeBtn.addEventListener('click', () => {
        modeIndex = (modeIndex + 1) % modes.length;
        playMode = modes[modeIndex];
        modeBtn.textContent = modeNames[modeIndex];
    });

    // ==================== 音量 ====================
    volumeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        volumePopup.style.display = volumePopup.style.display === 'none' ? 'block' : 'none';
    });

    volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value / 100;
    });
    audio.volume = 0.8;

    document.addEventListener('click', () => {
        volumePopup.style.display = 'none';
    });

    // ==================== 歌词加载 ====================
    lyricsBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        lyricsPopup.style.display = lyricsPopup.style.display === 'none' ? 'block' : 'none';
    });

    document.getElementById('btn-close-lyrics-popup').addEventListener('click', () => {
        lyricsPopup.style.display = 'none';
    });

    // 从文件加载
    document.getElementById('lrc-file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            lyricsTextarea.value = ev.target.result;
            await loadLyricsFromText(ev.target.result);
        };
        reader.readAsText(file);
    });

    // 从文本加载
    document.getElementById('btn-load-lyrics-text').addEventListener('click', async () => {
        const text = lyricsTextarea.value.trim();
        if (!text) return;
        await loadLyricsFromText(text);
        lyricsPopup.style.display = 'none';
    });

    async function loadLyricsFromText(text) {
        const format = text.match(/\[\d{2}:\d{2}\.\d{2,3}\]/) ? 'lrc' : 'simple';
        await fetch('/api/lyrics', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text, format })
        });
        await refreshLyrics();
    }

    // ==================== 播放列表面板 ====================
    listBtn.addEventListener('click', () => {
        playlistPanel.classList.add('open');
        panelOverlay.style.display = 'block';
    });

    document.getElementById('btn-close-list').addEventListener('click', closePanel);
    panelOverlay.addEventListener('click', closePanel);

    function closePanel() {
        playlistPanel.classList.remove('open');
        panelOverlay.style.display = 'none';
    }

    // ==================== 背景（始终透明） ====================
    function updateBackground() {
        playerBg.style.background = 'transparent';
    }

    // ==================== 工具函数 ====================
    function formatTime(sec) {
        if (!sec) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // 加载歌词
    async function refreshLyrics() {
        lyricsData = [];
        currentLyricIndex = -1;
        lyricsDisplay.style.display = 'none';

        try {
            const resp = await fetch('/api/lyrics');
            const data = await resp.json();
            if (data.lyrics && data.lyrics.length > 0) {
                lyricsData = data.lyrics;
                lyricsScroll.innerHTML = lyricsData.map((l, i) =>
                    `<div class="lyric-line-item" data-idx="${i}">
                        <span class="lyric-time">${formatTime(l.time)}</span>
                        <span class="lyric-text">${l.text}</span>
                    </div>`
                ).join('');
                lyricsDisplay.style.display = 'flex';
            }
        } catch (e) {
            console.log('未加载歌词');
        }
    }

    // 歌词同步
    function syncLyrics() {
        if (!lyricsData.length) return;
        const currentTime = audio.currentTime;
        let idx = -1;
        for (let i = 0; i < lyricsData.length; i++) {
            if (lyricsData[i].time <= currentTime) idx = i;
            else break;
        }
        if (idx !== currentLyricIndex) {
            currentLyricIndex = idx;
            document.querySelectorAll('.lyric-line-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.querySelector(`.lyric-line-item[data-idx="${idx}"]`);
            if (activeEl) {
                activeEl.classList.add('active');
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    }

    async function recordListen() {
        if (!currentTrack || !playStartTime) return;
        const duration = (Date.now() - playStartTime) / 1000;
        if (duration < 5) return;
        try {
            await fetch('/api/listen/record', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ track_title: currentTrack.title, duration })
            });
        } catch (e) { console.error('听歌记录失败:', e); }
    }

    // 记录练习
    async function recordPractice() {
        if (!currentTrack || !playStartTime) return;
        const duration = (Date.now() - playStartTime) / 1000;
        if (duration < 5) return;
        try {
            await fetch('/api/practice/record', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    score_id: 0,
                    score_title: currentTrack.title,
                    duration: duration,
                    notes_played: 0,
                    accuracy: 0
                })
            });
        } catch (e) {
            console.error('记录练习失败:', e);
        }
    }

    // ==================== 初始化 ====================
    loadTracks();
    updateBackground();
});
</script>
{% endblock %}
