<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}余音 - 竹笛学习助手{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <div class="sidebar-trigger" id="sidebar-trigger"></div>
        <nav class="sidebar auto-hide" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-mark">余</div>
                    <div>
                        <div class="logo-text">余音</div>
                        <div class="logo-subtitle">竹笛学习助手</div>
                    </div>
                </div>
            </div>

            <div class="nav-links">
                <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
                    <span class="nav-icon">=</span>
                    <span class="nav-label">曲库</span>
                </a>
                <a href="/player" class="nav-item {% if request.url.path == '/player' %}active{% endif %}">
                    <span class="nav-icon">></span>
                    <span class="nav-label">播放器</span>
                </a>
                <a href="/editor" class="nav-item {% if request.url.path == '/editor' %}active{% endif %}">
                    <span class="nav-icon">~</span>
                    <span class="nav-label">简谱</span>
                </a>
                <a href="/practice" class="nav-item {% if request.url.path == '/practice' %}active{% endif %}">
                    <span class="nav-icon">/</span>
                    <span class="nav-label">练习</span>
                </a>
                <a href="/lyrics" class="nav-item {% if request.url.path == '/lyrics' %}active{% endif %}">
                    <span class="nav-icon">+</span>
                    <span class="nav-label">歌词</span>
                </a>
                <a href="/tools" class="nav-item {% if request.url.path == '/tools' %}active{% endif %}">
                    <span class="nav-icon">$</span>
                    <span class="nav-label">工具</span>
                </a>
                <a href="/settings" class="nav-item {% if request.url.path == '/settings' %}active{% endif %}">
                    <span class="nav-icon">#</span>
                    <span class="nav-label">设置</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <span class="version">v0.2</span>
            </div>
        </nav>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <audio id="audio-player" preload="auto"></audio>
    <script src="/static/js/player.js"></script>
    <script>
    // 页面加载时应用背景图片
    fetch('/api/background').then(r => r.json()).then(data => {
        if (data.current) {
            document.body.style.backgroundImage = `url(${data.current})`;
            document.body.style.backgroundSize = 'cover';
            document.body.style.backgroundPosition = 'center';
            document.body.style.backgroundRepeat = 'no-repeat';
            document.body.style.backgroundAttachment = 'fixed';
        }
    }).catch(() => {});

    // 侧边栏自动隐藏
    const trigger = document.getElementById('sidebar-trigger');
    const sidebar = document.getElementById('sidebar');
    if (trigger && sidebar) {
        trigger.addEventListener('mouseenter', () => sidebar.classList.add('visible'));
        sidebar.addEventListener('mouseleave', () => sidebar.classList.remove('visible'));
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
