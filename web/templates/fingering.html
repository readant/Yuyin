{% extends "base.html" %}

{% block title %}余音 - 指法速查{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">指法速查</h1>
    <p class="page-subtitle">查看竹笛各音符的按孔指法</p>
</div>

<div class="fingering-layout">
    <!-- 选择区 -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">选择音符</h2>
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">调性</label>
                <select id="key-select" class="select">
                    <option value="D">D调</option>
                    <option value="G">G调</option>
                    <option value="C">C调</option>
                    <option value="F">F调</option>
                    <option value="E">E调</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">指法类型</label>
                <select id="type-select" class="select">
                    <option value="5">筒音作5</option>
                    <option value="1">筒音作1</option>
                    <option value="2">筒音作2</option>
                </select>
            </div>
        </div>

        <!-- 音符选择按钮 -->
        <div id="note-buttons" class="note-buttons"></div>
    </div>

    <!-- 指法图示 -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">指法图示</h2>
        </div>
        <div class="fingering-display-large">
            <div id="fingering-holes" class="fingering-holes-large"></div>
            <div id="fingering-note-name" class="fingering-note-name-large">选择一个音符</div>
        </div>
    </div>

    <!-- 各指法对照表 -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">各指法对照</h2>
        </div>
        <div id="fingering-compare" class="fingering-compare">
            <p class="placeholder-text">选择音符后显示对照</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    const keySelect = document.getElementById('key-select');
    const typeSelect = document.getElementById('type-select');
    const noteButtons = document.getElementById('note-buttons');
    const fingeringHoles = document.getElementById('fingering-holes');
    const fingeringNoteName = document.getElementById('fingering-note-name');
    const fingeringCompare = document.getElementById('fingering-compare');

    let currentNote = null;

    // 加载音符按钮
    async function loadNotes() {
        const type = typeSelect.value;
        try {
            const resp = await fetch(`/api/notes?type=${type}`);
            const data = await resp.json();
            if (data.notes) {
                noteButtons.innerHTML = data.notes.map(note => `
                    <button class="note-btn" data-note="${note}">${note}</button>
                `).join('');

                noteButtons.querySelectorAll('.note-btn').forEach(btn => {
                    btn.addEventListener('click', () => selectNote(btn.dataset.note));
                });
            }
        } catch (e) {
            console.error('加载音符失败:', e);
        }
    }

    // 选择音符
    async function selectNote(note) {
        currentNote = note;

        // 更新按钮状态
        noteButtons.querySelectorAll('.note-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.note === note);
        });

        // 获取指法
        const type = typeSelect.value;
        try {
            const resp = await fetch(`/api/fingering/${note}?type=${type}`);
            const data = await resp.json();

            if (data.fingering) {
                // 显示指法图示（6个孔）
                fingeringHoles.innerHTML = data.fingering.map((pressed, i) => `
                    <div class="hole-large ${pressed ? 'pressed' : ''}">${i + 1}</div>
                `).join('');
                fingeringNoteName.textContent = note;
            }
        } catch (e) {
            console.error('获取指法失败:', e);
        }

        // 加载对照表
        loadCompare(note);
    }

    // 加载各指法对照
    async function loadCompare(note) {
        const types = ['5', '1', '2'];
        const typeNames = {'5': '筒音作5', '1': '筒音作1', '2': '筒音作2'};

        try {
            const results = await Promise.all(types.map(async t => {
                const resp = await fetch(`/api/fingering/${note}?type=${t}`);
                return resp.json();
            }));

            fingeringCompare.innerHTML = results.map((r, i) => {
                if (r.error) return '';
                return `<div class="compare-item">
                    <span class="compare-type">${typeNames[types[i]]}</span>
                    <span class="compare-display">${r.display}</span>
                </div>`;
            }).join('');
        } catch (e) {
            console.error('加载对照表失败:', e);
        }
    }

    // 监听选择变化
    keySelect.addEventListener('change', loadNotes);
    typeSelect.addEventListener('change', () => {
        loadNotes();
        if (currentNote) selectNote(currentNote);
    });

    loadNotes();
});
</script>
{% endblock %}
