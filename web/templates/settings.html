{% extends "base.html" %}

{% block title %}余音 - 设置{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">设置</h1>
    <p class="page-subtitle">自定义你的学习偏好</p>
</div>

<div class="settings-layout">
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">默认设置</h2>
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">默认调性</label>
                <select id="default-key" class="select">
                    <option value="D">D调</option>
                    <option value="G">G调</option>
                    <option value="C">C调</option>
                    <option value="F">F调</option>
                    <option value="E">E调</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">默认指法类型</label>
                <select id="default-fingering" class="select">
                    <option value="5">筒音作5</option>
                    <option value="1">筒音作1</option>
                    <option value="2">筒音作2</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 class="card-title">练习统计</h2>
        </div>
        <div id="practice-stats" class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="stat-duration">0</div>
                <div class="stat-label">练习时长（分钟）</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-count">0</div>
                <div class="stat-label">练习次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-accuracy">0%</div>
                <div class="stat-label">平均准确率</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-notes">0</div>
                <div class="stat-label">总音符数</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 class="card-title">关于</h2>
        </div>
        <div class="about-info">
            <p><strong>余音 v0.2</strong></p>
            <p>竹笛学习助手 - 专业的音乐播放与学习工具</p>
            <p class="text-secondary">基于 FastAPI + Jinja2 构建</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    // 加载设置
    const savedKey = localStorage.getItem('yuyin_default_key') || 'D';
    const savedFingering = localStorage.getItem('yuyin_default_fingering') || '5';
    document.getElementById('default-key').value = savedKey;
    document.getElementById('default-fingering').value = savedFingering;

    // 保存设置
    document.getElementById('default-key').addEventListener('change', (e) => {
        localStorage.setItem('yuyin_default_key', e.target.value);
    });
    document.getElementById('default-fingering').addEventListener('change', (e) => {
        localStorage.setItem('yuyin_default_fingering', e.target.value);
    });

    // 加载练习统计
    async function loadStats() {
        try {
            const resp = await fetch('/api/practice/stats');
            const data = await resp.json();
            document.getElementById('stat-duration').textContent = data.total_duration || 0;
            document.getElementById('stat-count').textContent = data.total_count || 0;
            document.getElementById('stat-accuracy').textContent = (data.average_accuracy || 0) + '%';
            document.getElementById('stat-notes').textContent = data.total_notes || 0;
        } catch (e) {
            console.error('加载练习统计失败:', e);
        }
    }

    loadStats();
});
</script>
{% endblock %}
