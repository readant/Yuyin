{% extends "base.html" %}
{% block title %}余音 - 音频工具{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">音频仪表盘</h1>
    <p class="page-subtitle">专业级音频可视化与分析工具</p>
</div>

<div class="dashboard-layout">
    <!-- 上传与录音 -->
    <div class="dash-row">
        <div class="dash-col col-8">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">音频源</h2>
                    <div class="dash-actions">
                        <input type="file" id="file-input" accept="audio/*" style="display:none;">
                        <button class="btn btn-sm" onclick="document.getElementById('file-input').click()">选择文件</button>
                        <button id="btn-record-dash" class="btn btn-sm" onclick="toggleRecord()">⏺ 录音</button>
                    </div>
                </div>
                <div class="bg-upload-area" id="upload-area">拖拽音频文件到此处<br><small>WAV, MP3, FLAC</small></div>
                <div id="record-panel" class="record-panel" style="display: none;">
                    <div class="record-header">
                        <span id="record-time" class="record-time">00:00</span>
                        <div class="record-dot" id="record-dot"></div>
                        <button class="btn btn-sm btn-primary" onclick="stopRecord()">停止</button>
                    </div>
                    <canvas id="record-canvas" width="800" height="60" class="waveform"></canvas>
                </div>
            </div>
        </div>
        <div class="dash-col col-4" id="info-panel" style="display: none;">
            <div class="card">
                <div class="card-header"><h2 class="card-title">文件信息</h2></div>
                <div id="audio-info" class="dash-info"></div>
            </div>
        </div>
    </div>

    <!-- 波形图 -->
    <div class="card" id="wave-card" style="display: none;">
        <div class="card-header">
            <h2 class="card-title">波形</h2>
            <div class="wave-controls">
                <button id="btn-play" class="btn btn-sm" disabled>▶</button>
                <span id="play-time">0:00</span> / <span id="play-end">0:00</span>
                <input type="range" id="vol-local" class="vol-local" min="0" max="100" value="80">
            </div>
        </div>
        <canvas id="waveform-canvas" width="1000" height="180" class="waveform-dash"></canvas>
    </div>

    <!-- 处理工具 + 频谱 -->
    <div class="dash-row" id="tools-row" style="display: none;">
        <div class="dash-col col-6">
            <div class="card">
                <div class="card-header"><h2 class="card-title">处理工具</h2></div>
                <div class="process-grid">
                    <div class="process-item">
                        <span>裁剪 (秒)</span>
                        <div class="input-row">
                            <input type="number" id="trim-start" class="input" value="0" step="0.1" style="width:70px;">
                            <span>~</span>
                            <input type="number" id="trim-end" class="input" value="30" step="0.1" style="width:70px;">
                            <button class="btn btn-sm btn-secondary" onclick="doTrim()">裁剪</button>
                        </div>
                    </div>
                    <div class="process-item">
                        <span>变调 (半音)</span>
                        <div class="input-row">
                            <button class="btn btn-sm" onclick="adjPitch(-1)">-1</button>
                            <span id="pitch-value">0</span>
                            <button class="btn btn-sm" onclick="adjPitch(1)">+1</button>
                            <button class="btn btn-sm btn-secondary" onclick="doPitchShift()">变调</button>
                        </div>
                    </div>
                    <div class="process-item">
                        <span>归一化 / 分析</span>
                        <div class="input-row">
                            <button class="btn btn-sm btn-secondary" onclick="doNormalize()">归一化</button>
                            <button class="btn btn-sm btn-primary" onclick="doAnalyze()">生成简谱</button>
                        </div>
                    </div>
                </div>
                <div id="tools-result" class="tools-result"></div>
            </div>
        </div>
        <div class="dash-col col-6">
            <div class="card">
                <div class="card-header"><h2 class="card-title">频谱分析</h2></div>
                <canvas id="spectrum-canvas" width="500" height="160" class="waveform"></canvas>
            </div>
        </div>
    </div>

    <!-- 简谱结果 -->
    <div class="card" id="score-result-card" style="display: none;">
        <div class="card-header"><h2 class="card-title">识别简谱</h2></div>
        <div id="score-notes-list" class="score-notes-grid"></div>
        <div id="score-text" class="score-text"></div>
        <button class="btn btn-primary" onclick="saveToEditor()">保存到编辑器</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentFile, audioBuffer, audioCtx, audioSource, isPlaying, playStart, playOffset, raf;
let pitchShift = 0, scoreText = '', scoreNotes = [];

// 上传
const ua = document.getElementById('upload-area'), fi = document.getElementById('file-input');
ua.addEventListener('click', () => fi.click());
ua.addEventListener('dragover', e => { e.preventDefault(); ua.classList.add('dragover'); });
ua.addEventListener('dragleave', () => ua.classList.remove('dragover'));
ua.addEventListener('drop', e => { e.preventDefault(); ua.classList.remove('dragover'); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
fi.addEventListener('change', e => { if(e.target.files[0]) loadFile(e.target.files[0]); });

async function loadFile(file) {
    currentFile = file;
    const ab = await file.arrayBuffer();
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioBuffer = await audioCtx.decodeAudioData(ab);
    showInfo();
}

function showInfo() {
    document.getElementById('audio-info').innerHTML = `<div class="info-row"><span>文件：</span><strong>${currentFile.name}</strong></div>
        <div class="info-row"><span>大小：</span>${(currentFile.size/1024/1024).toFixed(1)} MB</div>
        <div class="info-row"><span>时长：</span>${fmt(audioBuffer.duration)}</div>
        <div class="info-row"><span>采样率：</span>${audioBuffer.sampleRate} Hz</div>`;
    document.getElementById('play-end').textContent = fmt(audioBuffer.duration);
    document.getElementById('trim-end').value = Math.round(audioBuffer.duration);
    document.getElementById('btn-play').disabled = false;
    document.getElementById('info-panel').style.display = 'block';
    document.getElementById('wave-card').style.display = 'block';
    document.getElementById('tools-row').style.display = 'flex';
    drawWaveform();
    drawSpectrum();
}

// 播放
document.getElementById('btn-play').addEventListener('click', () => {
    if (isPlaying) { isPlaying = false; audioSource?.stop(); document.getElementById('btn-play').textContent='▶'; cancelAnimationFrame(raf); return; }
    isPlaying = true; playStart = audioCtx.currentTime;
    audioSource = audioCtx.createBufferSource(); audioSource.buffer = audioBuffer; audioSource.connect(audioCtx.destination);
    audioSource.start(); document.getElementById('btn-play').textContent='■';
    (function tick(){ if(!isPlaying) return; document.getElementById('play-time').textContent = fmt(Math.min(audioCtx.currentTime-playStart,audioBuffer.duration)); if(audioCtx.currentTime-playStart>=audioBuffer.duration){isPlaying=false;document.getElementById('btn-play').textContent='▶';} else raf=requestAnimationFrame(tick); })();
});

// 波形
function drawWaveform() {
    const c = document.getElementById('waveform-canvas'), ctx = c.getContext('2d'), w = c.width, h = c.height;
    const data = audioBuffer.getChannelData(0), step = Math.ceil(data.length / w);
    ctx.fillStyle = '#F5F0E8'; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#8B2500';
    for (let i = 0; i < w; i++) {
        let max = 0;
        for (let j = 0; j < step; j++) { const idx = i*step+j; if(idx<data.length) max = Math.max(max, Math.abs(data[idx])); }
        ctx.fillRect(i, h/2 - max*(h/2), 1.5, Math.max(1, max*h));
    }
    ctx.strokeStyle = '#C4B8A8'; ctx.lineWidth = 0.5;
    for (let y = 0; y <= h; y += h/4) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
    ctx.fillStyle = '#9B9B9B'; ctx.font = '10px sans-serif';
    for (let i = 0; i <= audioBuffer.duration; i += Math.max(1, Math.floor(audioBuffer.duration/8))) { ctx.fillText(fmt(i), (i/audioBuffer.duration)*w-10, h-3); }
}

function drawSpectrum() {
    const c = document.getElementById('spectrum-canvas'), ctx = c.getContext('2d'), w = c.width, h = c.height;
    const data = audioBuffer.getChannelData(0).slice(0, Math.min(audioBuffer.length, audioBuffer.sampleRate*2));
    ctx.fillStyle = '#F5F0E8'; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#8B2500'; const bars = 100, bw = w / bars;
    for (let i = 0; i < bars; i++) { const v = Math.abs(data[Math.floor(i/bars*data.length)]||0); ctx.fillRect(i*bw, h-v*h*5, bw-1, v*h*5); }
}

// 处理
function showResult(m, u) { document.getElementById('tools-result').innerHTML = u ? `<p>${m} <a href="${u}" download>下载</a></p>` : `<p>${m}</p>`; }
async function doTrim() {
    const fd = new FormData(); fd.append('file', currentFile);
    const r = await fetch(`/api/audio/trim?start=${document.getElementById('trim-start').value}&end=${document.getElementById('trim-end').value}`, { method: 'POST', body: fd });
    const d = await r.json(); showResult(d.success ? '裁剪完成' : '裁剪失败', d.url);
}
async function doPitchShift() {
    const fd = new FormData(); fd.append('file', currentFile);
    const r = await fetch(`/api/audio/pitch?shift=${pitchShift}`, { method: 'POST', body: fd });
    const d = await r.json(); showResult(d.success ? '变调完成' : '变调失败', d.url);
}
function adjPitch(d) { pitchShift += d; document.getElementById('pitch-value').textContent = pitchShift; }
async function doNormalize() {
    const fd = new FormData(); fd.append('file', currentFile);
    const r = await fetch('/api/audio/normalize', { method: 'POST', body: fd });
    const d = await r.json(); showResult(d.success ? '归一化完成' : '归一化失败', d.url);
}
async function doAnalyze() {
    const fd = new FormData(); fd.append('file', currentFile);
    const r = await fetch('/api/audio/analyze', { method: 'POST', body: fd });
    const d = await r.json();
    if (d.success) { scoreText = d.score_text; scoreNotes = d.notes || [];
        document.getElementById('score-result-card').style.display = 'block';
        document.getElementById('score-text').textContent = scoreText;
        document.getElementById('score-notes-list').innerHTML = scoreNotes.map(n=>`<span class="score-note-badge">${n.note}</span>`).join('') + `<span class="text-secondary"> 共${scoreNotes.length}音符</span>`; }
    else alert('分析失败: '+d.error);
}
async function saveToEditor() {
    const r = await fetch('/api/score', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({title:currentFile.name.replace(/\.[^.]+$/,''), notes_data:scoreText}) });
    const d = await r.json(); if(d.success) window.location.href='/editor'; else alert('保存失败');
}

// 录音
let mediaRecorder, recordChunks, recording, recordStream, recordCtx, recordRaf;
async function toggleRecord() {
    if (recording) { stopRecord(); return; }
    try {
        recordStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recordCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = recordCtx.createMediaStreamSource(recordStream), ana = recordCtx.createAnalyser(); ana.fftSize = 256; src.connect(ana);
        mediaRecorder = new MediaRecorder(recordStream); recordChunks = [];
        mediaRecorder.ondataavailable = e => recordChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            recording = false; const blob = new Blob(recordChunks, { type: 'audio/wav' });
            currentFile = new File([blob], '录音_' + Date.now() + '.wav', { type: 'audio/wav' });
            const ab = await blob.arrayBuffer(); audioCtx = new (window.AudioContext||window.webkitAudioContext)(); audioBuffer = await audioCtx.decodeAudioData(ab);
            showInfo();
        };
        mediaRecorder.start(); recording = true;
        document.getElementById('record-panel').style.display = 'block'; document.getElementById('upload-area').style.display = 'none';
        document.getElementById('record-dot').classList.add('blink');
        let st = Date.now(); setInterval(() => { if(recording) document.getElementById('record-time').textContent = fmt((Date.now()-st)/1000); }, 100);
        drawRecord();
    } catch(e) { alert('无法访问麦克风: '+e.message); }
}
function stopRecord() { if(!recording) return; mediaRecorder.stop(); recordStream.getTracks().forEach(t=>t.stop()); cancelAnimationFrame(recordRaf); document.getElementById('record-panel').style.display='none'; document.getElementById('upload-area').style.display='block'; document.getElementById('record-dot').classList.remove('blink'); }
function drawRecord() { if(!recording) return; const c=document.getElementById('record-canvas'),ctx=c.getContext('2d'),w=c.width,h=c.height; const buf=new Uint8Array(256); recordCtx.createAnalyser().getByteFrequencyData(buf); ctx.fillStyle='#F5F0E8';ctx.fillRect(0,0,w,h);ctx.fillStyle='#8B2500'; for(let i=0;i<buf.length;i++){ctx.fillRect(i*(w/256),h-(buf[i]/255)*h,w/256-1,(buf[i]/255)*h);} recordRaf=requestAnimationFrame(drawRecord); }

function fmt(sec) { const m = Math.floor(sec/60), s = Math.floor(sec%60); return `${m}:${s.toString().padStart(2,'0')}`; }
</script>
{% endblock %}
