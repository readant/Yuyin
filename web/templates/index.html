{% extends "base.html" %}

{% block title %}余音 - 曲库{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">曲库</h1>
    <p class="page-subtitle">管理你的音乐收藏</p>
</div>

<div class="toolbar">
    <div class="toolbar-left">
        <input type="text" id="search-input" class="input" placeholder="搜索曲目..." style="width: 260px;">
    </div>
    <div class="toolbar-right">
        <button id="scan-btn" class="btn btn-primary">扫描文件夹</button>
    </div>
</div>

<div id="scan-status" class="scan-status" style="display: none;"></div>

<table class="table">
    <thead>
        <tr>
            <th style="width: 50px;">#</th>
            <th>曲目</th>
            <th>艺术家</th>
            <th style="width: 80px;">时长</th>
            <th style="width: 80px;">操作</th>
        </tr>
    </thead>
    <tbody id="track-list">
        <tr>
            <td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 40px;">
                暂无曲目，请先扫描文件夹
            </td>
        </tr>
    </tbody>
</table>

<div id="track-count" class="track-count">共 0 首歌曲</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('search-input');
    const scanBtn = document.getElementById('scan-btn');
    const trackList = document.getElementById('track-list');
    const trackCount = document.getElementById('track-count');
    const scanStatus = document.getElementById('scan-status');

    let allTracks = [];

    // 加载曲目列表
    async function loadTracks() {
        try {
            const resp = await fetch('/api/tracks');
            const data = await resp.json();
            allTracks = data.tracks || [];
            renderTracks(allTracks);
        } catch (e) {
            console.error('加载曲目失败:', e);
        }
    }

    // 渲染曲目列表
    function renderTracks(tracks) {
        if (tracks.length === 0) {
            trackList.innerHTML = `
                <tr>
                    <td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 40px;">
                        暂无曲目，请先扫描文件夹
                    </td>
                </tr>`;
            trackCount.textContent = '共 0 首歌曲';
            return;
        }

        trackList.innerHTML = tracks.map((t, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>${t.title}</td>
                <td>${t.artist || '未知'}</td>
                <td>${formatDuration(t.duration)}</td>
                <td>
                    <button class="btn btn-sm" onclick="playTrack(${t.id})">播放</button>
                </td>
            </tr>
        `).join('');
        trackCount.textContent = `共 ${tracks.length} 首歌曲`;
    }

    // 搜索过滤
    searchInput.addEventListener('input', (e) => {
        const kw = e.target.value.toLowerCase();
        if (!kw) {
            renderTracks(allTracks);
            return;
        }
        const filtered = allTracks.filter(t =>
            t.title.toLowerCase().includes(kw) ||
            (t.artist && t.artist.toLowerCase().includes(kw))
        );
        renderTracks(filtered);
    });

    // 扫描文件夹
    scanBtn.addEventListener('click', async () => {
        const path = prompt('请输入音乐文件夹路径：');
        if (!path) return;

        scanStatus.style.display = 'block';
        scanStatus.textContent = '扫描中...';
        scanStatus.className = 'scan-status';

        try {
            const resp = await fetch('/api/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({path})
            });
            const data = await resp.json();
            if (data.success) {
                scanStatus.textContent = `扫描完成，找到 ${data.count} 首曲目`;
                scanStatus.className = 'scan-status success';
                loadTracks();
            } else {
                scanStatus.textContent = '扫描失败：' + (data.error || '未知错误');
                scanStatus.className = 'scan-status error';
            }
        } catch (e) {
            scanStatus.textContent = '扫描出错：' + e.message;
            scanStatus.className = 'scan-status error';
        }
    });

    // 播放曲目
    window.playTrack = function(trackId) {
        window.location.href = '/player?track=' + trackId;
    };

    // 格式化时长
    function formatDuration(seconds) {
        if (!seconds) return '0:00';
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    loadTracks();
});
</script>
{% endblock %}
