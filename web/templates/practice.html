{% extends "base.html" %}
{% block title %}余音 - 练习{% endblock %}
{% block content %}

<!-- 顶部控制栏 -->
<div class="pr-bar" id="pr-bar">
    <select id="score-select" class="select" style="width:180px;"><option>选择简谱...</option></select>
    <div class="mode-switch">
        <button id="mode-follow" class="mode-btn active" onclick="setMode('follow')">跟吹</button>
        <button id="mode-test" class="mode-btn" onclick="setMode('test')">测试</button>
    </div>
    <div class="bpm-box">
        <button class="btn btn-sm" onclick="adjBpm(-10)">-10</button>
        <button class="btn btn-sm" onclick="adjBpm(-1)">-1</button>
        <span class="bpm-big" id="bpm-display">80</span>
        <button class="btn btn-sm" onclick="adjBpm(1)">+1</button>
        <button class="btn btn-sm" onclick="adjBpm(10)">+10</button>
    </div>
    <div class="beat-bar" id="beat-bar">
        <div class="beat-dot" id="beat-dot-1"></div><div class="beat-dot" id="beat-dot-2"></div>
        <div class="beat-dot" id="beat-dot-3"></div><div class="beat-dot" id="beat-dot-4"></div>
    </div>
    <button id="btn-start" class="btn btn-primary">▶ 开始</button>
    <button id="btn-stop" class="btn btn-secondary" disabled>■ 停止</button>
    <input type="file" id="audio-file-input" accept="audio/*" style="display:none;">
    <button class="btn btn-sm" onclick="document.getElementById('audio-file-input').click()" id="btn-audio-gen" style="display:none;">音频→简谱</button>
</div>

<!-- 主区域：洞洞谱 + 指法 -->
<div class="pr-main" id="pr-main" style="display:none;">
    <!-- 洞洞谱（主体） -->
    <div class="pr-dongdong-area" id="pr-dongdong-area">
        <div id="pr-dongdong" class="pr-dongdong"></div>
    </div>
    <!-- 指法（侧边辅助） -->
    <div class="pr-right">
        <div class="pr-fingering-mini">
            <div class="fingering-holes-small" id="pr-holes">
                <div class="hole-small">-</div><div class="hole-small">-</div><div class="hole-small">-</div>
                <div class="hole-small">-</div><div class="hole-small">-</div><div class="hole-small">-</div>
            </div>
            <div id="pr-fingering-note" class="pr-fn-note">--</div>
        </div>
        <!-- 测试反馈 -->
        <div id="test-feedback" style="display:none;">
            <div id="detected-note" class="pr-detect-note">--</div>
            <div id="note-status" class="pr-status"></div>
            <canvas id="practice-canvas" width="120" height="80" class="pr-canvas"></canvas>
            <div class="stats-grid stats-grid-2" style="margin-top:8px;">
                <div class="stat-item"><div class="stat-value" id="stat-correct">0</div><div class="stat-label">正确</div></div>
                <div class="stat-item"><div class="stat-value" id="stat-rate">0%</div><div class="stat-label">准确率</div></div>
            </div>
        </div>
        <!-- 测试结果 -->
        <div id="result-card" style="display:none;">
            <div class="stat-value" id="stat-time">0s</div>
            <div id="diff-notes" class="diff-notes" style="margin-top:4px;"></div>
        </div>
    </div>
</div>

<div id="gen-progress" class="progress-bar-wrap" style="display:none; margin-top:8px;"><div class="progress-bar-inner"></div></div>

{% endblock %}
{% block scripts %}
<script>
const F5 = {'(5)':'bbbbbb','(6)':'bbbbbw','(7)':'bbbbww','1':'bbbwww','2':'bbwwww','3':'bwwwww','4':'wbbwww','5':'wbbbbb','6':'bbbbbw','7':'bbbbww','[1]':'bbbwww','[2]':'bbwwww','[3]':'bwwwww','[4]':'hwwwww','[5]':'wbbbbb'};

let scoreNotes = [], selScore, bpm = 80, noteIdx = 0, isRunning = false, mode = 'follow';
let correct = 0, wrong = 0, metroTimer, stepTimer;
let audioCtx, micStream, analyser, recChunks = [], recorder, startTime, recordedBuffer = null;

function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('mode-' + m).classList.add('active');
}

// 加载简谱列表
async function loadScores() {
    const r = await fetch('/api/scores'); const d = await r.json();
    const sel = document.getElementById('score-select');
    sel.innerHTML = '<option value="">选择简谱...</option>' + (d.scores||[]).map(s => `<option value="${s.id}">${s.title} (${s.key}调)</option>`).join('');
    sel.addEventListener('change', async () => { if(sel.value) selectScore(sel.value); });
}

window.selectScore = async (id) => {
    const r = await fetch(`/api/score/${id}`); const d = await r.json();
    selScore = d; scoreNotes = JSON.parse(d.notes_data || '[]').filter(n => n.note !== 'BAR');
    bpm = d.tempo || 80; document.getElementById('bpm-display').textContent = bpm;
    document.getElementById('pr-main').style.display = 'flex';
    document.getElementById('btn-audio-gen').style.display = 'inline-block';

    // 渲染洞洞谱
    const dd = document.getElementById('pr-dongdong');
    dd.innerHTML = scoreNotes.map((n, i) => {
        const f = F5[n.note];
        return `<div class="dd-unit" data-idx="${i}"><span class="dd-note">${n.note.replace(/[()\[\]]/g,'')}</span><div class="dd-holes">${f?f.split('').map(c=>`<span class="dd-dot ${c==='b'?'on':'off'}">${c==='b'?'●':'○'}</span>`).join(''):''}</div></div>`;
    }).join('');
    showNote(0);
};

function showNote(idx) {
    document.querySelectorAll('.dd-unit').forEach(e => e.classList.remove('active'));
    const el = document.querySelector(`.dd-unit[data-idx="${idx}"]`);
    if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' }); }
    const note = scoreNotes[idx]; if (!note) return;
    document.getElementById('pr-fingering-note').textContent = note.note.replace(/[()\[\]]/g,'');
    const f = F5[note.note];
    if (f) document.querySelectorAll('#pr-holes .hole-small').forEach((h, j) => { h.classList.toggle('on', f[j]==='b'); h.textContent = f[j]==='b' ? '●' : (f[j]==='h' ? '◐' : '○'); });
}

window.adjBpm = (d) => { bpm = Math.max(20, Math.min(300, bpm + d)); document.getElementById('bpm-display').textContent = bpm; };

function runMetronome() {
    let beat = 0; const interval = 60000 / bpm;
    document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));
    metroTimer = setInterval(() => {
        document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));
        const dot = document.getElementById('beat-dot-' + ((beat % 4) + 1));
        if (dot) dot.classList.add('active');
        beat++;
    }, interval);
}

async function startPractice() {
    if (!selScore || isRunning) return;
    if (mode === 'test') {
        try {
            audioCtx = new (window.AudioContext||window.webkitAudioContext)();
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048;
            audioCtx.createMediaStreamSource(micStream).connect(analyser);
            recorder = new MediaRecorder(micStream); recChunks = []; recordedBuffer = null;
            recorder.ondataavailable = e => recChunks.push(e.data);
            recorder.onstop = async () => { const b = new Blob(recChunks,{type:'audio/wav'}); const ab = await b.arrayBuffer(); const c = new (window.AudioContext||window.webkitAudioContext)(); recordedBuffer = await c.decodeAudioData(ab); };
            recorder.start();
            document.getElementById('test-feedback').style.display = 'block';
            document.getElementById('result-card').style.display = 'none';
        } catch(e) { alert('麦克风错误: '+e.message); return; }
    }
    isRunning = true; noteIdx = 0; correct = 0; wrong = 0; startTime = Date.now();
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;
    runMetronome(); stepThrough();
    if (mode === 'test') detectLoop();
}

function stepThrough() {
    if (!isRunning || noteIdx >= scoreNotes.length) { stopPractice(); return; }
    showNote(noteIdx);
    stepTimer = setTimeout(() => { noteIdx++; stepThrough(); }, 60000 / bpm);
}

function detectLoop() {
    if (!isRunning || mode !== 'test') return;
    const buf = new Float32Array(analyser.fftSize); analyser.getFloatTimeDomainData(buf);
    const freq = detectFreq(buf, audioCtx.sampleRate);
    const note = freqToNote(freq);
    if (note) {
        document.getElementById('detected-note').textContent = note;
        const c = document.getElementById('practice-canvas'), ctx = c.getContext('2d'), w = c.width, h = c.height;
        const d = new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(d);
        ctx.fillStyle = '#F5F0E8'; ctx.fillRect(0, 0, w, h); ctx.fillStyle = '#8B2500';
        for (let i = 0; i < d.length; i++) { ctx.fillRect(i*(w/128), h-(d[i]/255)*h, w/128-1, (d[i]/255)*h); }
        if (noteIdx < scoreNotes.length && note === scoreNotes[noteIdx].note) {
            correct++; document.getElementById('note-status').textContent = '✓'; document.getElementById('note-status').style.color = '#2e7d32';
            document.querySelector(`.dd-unit[data-idx="${noteIdx}"]`)?.classList.add('done');
        }
    }
    document.getElementById('stat-correct').textContent = correct;
    document.getElementById('stat-rate').textContent = Math.round(correct/((correct+wrong)||1)*100)+'%';
    requestAnimationFrame(detectLoop);
}

function stopPractice() {
    isRunning = false; clearInterval(metroTimer); clearTimeout(stepTimer);
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (recorder && recorder.state === 'recording') recorder.stop();
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = true;
    document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));
    if (mode === 'test') showResults();
}

async function showResults() {
    let retries = 0;
    while (!recordedBuffer && retries < 20) { await new Promise(r => setTimeout(r, 100)); retries++; }
    document.getElementById('result-card').style.display = 'block';
    document.getElementById('stat-time').textContent = Math.round((Date.now() - startTime) / 1000) + 's';
    if (recordedBuffer) {
        const recPitches = extractPitches(recordedBuffer);
        document.getElementById('diff-notes').innerHTML = scoreNotes.slice(0, noteIdx).map((n, i) => {
            const rec = recPitches[i], isMatch = rec && rec.note === n.note;
            return `<span class="diff-note ${isMatch ? 'match' : 'miss'}">${n.note.replace(/[()\[\]]/g,'')}${rec ? '<small>'+rec.note.replace(/[()\[\]]/g,'')+'</small>' : ''}</span>`;
        }).join('');
    }
}

function extractPitches(buf) {
    const data = buf.getChannelData(0), sr = buf.sampleRate, notes = [], step = Math.floor(sr * 0.1);
    for (let i = 0; i < data.length - step; i += step) {
        const freq = detectFreq(new Float32Array(data.slice(i, i + step)), sr);
        if (freq > 50 && freq < 2000) { const n = freqToNote(freq); if (!notes.length || notes[notes.length-1].note !== n) notes.push({ note: n, freq: Math.round(freq) }); }
    }
    return notes;
}

function detectFreq(buf, sr) { let s = 0; for (let v of buf) s += v; const m = s/buf.length; let mc=0, ml=0; for (let l=40; l<buf.length/2; l++) { let c=0; for (let i=0;i<buf.length-l;i++) c+=(buf[i]-m)*(buf[i+l]-m); if(c>mc){mc=c;ml=l;} } return ml>0 ? sr/ml : 0; }
function freqToNote(f) { if(f<50||f>2000) return null; const st=Math.round(12*Math.log2(f/440))+69; const nm=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']; const mp={C:'1',D:'2',E:'3',F:'4',G:'5',A:'6',B:'7'}; return mp[nm[st%12]]||nm[st%12]; }

document.getElementById('btn-start').addEventListener('click', startPractice);
document.getElementById('btn-stop').addEventListener('click', stopPractice);
document.getElementById('audio-file-input').addEventListener('change', async (e) => {
    const file = e.target.files[0]; if (!file) return;
    const p = document.getElementById('gen-progress'); p.style.display = 'block';
    const fd = new FormData(); fd.append('file', file);
    const r = await fetch('/api/audio/analyze', {method:'POST', body:fd}); const d = await r.json(); p.style.display = 'none';
    if (d.success) { const sr = await fetch('/api/score', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:file.name.replace(/\.[^.]+$/,''),notes_data:d.score_text})}); if((await sr.json()).success) location.reload(); }
});

loadScores();
</script>
{% endblock %}
