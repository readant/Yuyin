{% extends "base.html" %}

{% block title %}播放器 - 余音{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">播放器</h1>
</div>

<div class="card" style="padding: var(--space-2xl);">
    <!-- 曲目信息 -->
    <div class="player-info" style="text-align: center; margin-bottom: var(--space-xl);">
        <h2 class="track-title" id="track-title">未播放</h2>
        <p class="track-artist" id="track-artist">选择一首歌曲开始播放</p>
    </div>

    <!-- 唱片/可视化 -->
    <div style="display: flex; justify-content: center; margin-bottom: var(--space-xl);">
        <div id="album-art" style="width: 250px; height: 250px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--bg-secondary), var(--border-light)); box-shadow: var(--shadow-lg);">
            <span style="font-size: 48px; color: var(--color-primary); opacity: 0.3;">~</span>
        </div>
    </div>

    <!-- 进度条 -->
    <div style="display: flex; align-items: center; gap: var(--space-md); margin-bottom: var(--space-lg); max-width: 600px; margin-left: auto; margin-right: auto;">
        <span style="font-family: Consolas; font-size: 12px; color: var(--text-secondary); min-width: 45px;" id="time-current">00:00</span>
        <input type="range" class="progress-slider" id="progress-slider" min="0" max="100" value="0" style="flex: 1;">
        <span style="font-family: Consolas; font-size: 12px; color: var(--text-secondary); min-width: 45px; text-align: right;" id="time-total">00:00</span>
    </div>

    <!-- 控制按钮 -->
    <div style="display: flex; justify-content: center; align-items: center; gap: var(--space-lg); margin-bottom: var(--space-lg);">
        <button class="control-btn" id="prev-btn" title="快退10秒" style="width: 50px; height: 50px; font-size: 16px;"><<</button>
        <button class="control-btn play-btn" id="play-btn" title="播放/暂停" style="width: 70px; height: 70px; font-size: 24px;">></button>
        <button class="control-btn" id="next-btn" title="快进10秒" style="width: 50px; height: 50px; font-size: 16px;">>></button>
    </div>

    <!-- 音量控制 -->
    <div style="display: flex; justify-content: center; align-items: center; gap: var(--space-md);">
        <span style="color: var(--text-secondary);">音量</span>
        <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="80" style="width: 150px;">
    </div>
</div>

<!-- 从曲库播放的按钮 -->
<div class="card">
    <div class="card-header">
        <h2 class="card-title">快速播放</h2>
    </div>
    <p style="color: var(--text-secondary); margin-bottom: var(--space-md);">
        前往曲库选择歌曲，或直接输入歌曲ID播放
    </p>
    <div style="display: flex; gap: var(--space-md);">
        <a href="/library" class="btn btn-primary">浏览曲库</a>
    </div>
</div>
{% endblock %}
