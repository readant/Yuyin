{% extends "base.html" %}

{% block title %}欣赏音乐 - 余音{% endblock %}

{% block content %}
<div style="display: grid; grid-template-columns: 350px 1fr; gap: var(--space-lg); height: calc(100vh - 40px);">
    <!-- 左侧：音乐库 -->
    <div class="card" style="overflow-y: auto;">
        <div class="card-header">
            <h2 class="card-title">音乐库</h2>
            <button class="btn btn-sm btn-secondary" onclick="scanDirectory()">扫描</button>
        </div>

        <input type="text" class="input" id="search-input" placeholder="搜索..." style="margin-bottom: var(--space-md);">

        <div id="scan-status" style="display: none; padding: var(--space-sm); background: var(--bg-secondary); border-radius: var(--radius-md); margin-bottom: var(--space-md); font-size: 12px;">
            扫描中...
        </div>

        <div id="track-list" style="max-height: calc(100vh - 250px); overflow-y: auto;">
            <p style="text-align: center; color: var(--text-secondary); padding: 40px 0;">暂无歌曲</p>
        </div>
    </div>

    <!-- 右侧：播放器 -->
    <div class="card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;">
        <!-- 背景装饰 -->
        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.05; pointer-events: none;">
            <div style="width: 100%; height: 100%; background: radial-gradient(circle at 30% 30%, var(--color-primary) 0%, transparent 50%);"></div>
        </div>

        <!-- 曲目信息 -->
        <div style="text-align: center; margin-bottom: var(--space-xl); z-index: 1;">
            <h1 class="track-title" id="track-title" style="font-size: 24px;">未播放</h1>
            <p class="track-artist" id="track-artist" style="color: var(--text-secondary);">选择一首歌曲</p>
        </div>

        <!-- 唱片 -->
        <div style="position: relative; margin-bottom: var(--space-xl); z-index: 1;">
            <div id="album-art" style="width: 280px; height: 280px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--bg-secondary), var(--border-light)); box-shadow: 0 10px 40px rgba(0,0,0,0.15); transition: transform 0.3s ease;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--color-primary); display: flex; align-items: center; justify-content: center;">
                    <span style="color: var(--paper); font-size: 24px;">~</span>
                </div>
            </div>
        </div>

        <!-- 进度条 -->
        <div style="width: 100%; max-width: 500px; margin-bottom: var(--space-lg); z-index: 1;">
            <div style="display: flex; justify-content: space-between; margin-bottom: var(--space-xs);">
                <span style="font-family: Consolas; font-size: 12px; color: var(--text-secondary);" id="time-current">00:00</span>
                <span style="font-family: Consolas; font-size: 12px; color: var(--text-secondary);" id="time-total">00:00</span>
            </div>
            <input type="range" class="progress-slider" id="progress-slider" min="0" max="100" value="0" style="width: 100%;">
        </div>

        <!-- 控制按钮 -->
        <div style="display: flex; align-items: center; gap: var(--space-xl); z-index: 1;">
            <button class="control-btn" id="prev-btn" title="快退10秒"><<</button>
            <button class="control-btn play-btn" id="play-btn" title="播放/暂停" style="width: 80px; height: 80px; font-size: 28px;">></button>
            <button class="control-btn" id="next-btn" title="快进10秒">>></button>
        </div>

        <!-- 音量 -->
        <div style="display: flex; align-items: center; gap: var(--space-md); margin-top: var(--space-lg); z-index: 1;">
            <span style="color: var(--text-secondary); font-size: 12px;">音量</span>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="80" style="width: 120px;">
        </div>
    </div>
</div>

<script>
// 所有曲目
var allTracks = [];

// 扫描目录
function scanDirectory() {
    var path = prompt("请输入音乐文件夹路径:");
    if (!path) return;

    var statusEl = document.getElementById('scan-status');
    statusEl.style.display = 'block';
    statusEl.textContent = '正在扫描...';

    fetch('/api/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: path })
    })
    .then(function(response) { return response.json(); })
    .then(function(data) {
        if (data.success) {
            statusEl.textContent = '找到 ' + data.count + ' 首歌曲';
            loadTracks();
        } else {
            statusEl.textContent = '扫描失败';
        }
        setTimeout(function() { statusEl.style.display = 'none'; }, 2000);
    });
}

// 加载曲目
function loadTracks() {
    fetch('/api/tracks')
    .then(function(response) { return response.json(); })
    .then(function(tracks) {
        allTracks = tracks;
        renderTracks(tracks);
    });
}

// 渲染曲目列表
function renderTracks(tracks) {
    var container = document.getElementById('track-list');

    if (tracks.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px 0;">暂无歌曲</p>';
        return;
    }

    container.innerHTML = tracks.map(function(track, index) {
        return '<div class="track-item" onclick="playTrack(' + track.id + ')" style="padding: 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 4px;">' +
            '<div style="font-weight: 500;">' + track.title + '</div>' +
            '<div style="font-size: 12px; color: var(--text-secondary);">' + track.artist + ' · ' + formatDuration(track.duration) + '</div>' +
            '</div>';
    }).join('');

    // 添加悬停效果
    document.querySelectorAll('.track-item').forEach(function(item) {
        item.addEventListener('mouseenter', function() {
            this.style.background = 'var(--bg-secondary)';
        });
        item.addEventListener('mouseleave', function() {
            this.style.background = 'transparent';
        });
    });
}

// 搜索
document.getElementById('search-input').addEventListener('input', function() {
    var keyword = this.value.toLowerCase();
    var filtered = allTracks.filter(function(track) {
        return track.title.toLowerCase().indexOf(keyword) !== -1 ||
               track.artist.toLowerCase().indexOf(keyword) !== -1;
    });
    renderTracks(filtered);
});

// 播放曲目
function playTrack(trackId) {
    if (typeof window.playTrackById === 'function') {
        window.playTrackById(trackId);
    }
}

// 格式化时长
function formatDuration(seconds) {
    var mins = Math.floor(seconds / 60);
    var secs = Math.floor(seconds % 60);
    return mins.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
}

// 页面加载时获取曲目
document.addEventListener('DOMContentLoaded', loadTracks);
</script>
{% endblock %}
